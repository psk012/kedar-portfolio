<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Page background -->
  <rect width="32" height="32" rx="8" fill="#0a0a0a"/>

  <!--
    Minimal "K" constructed from three rectangles.
    Stem: vertical bar on the left.
    Upper arm: diagonal from mid-stem to top-right.
    Lower arm: diagonal from mid-stem to bottom-right.
    Accent green (#4ade80) matches the site's accent color.
    Stroke-based so it scales crisply at any size.
  -->
  <line x1="10" y1="8"  x2="10" y2="24" stroke="#4ade80" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="10" y1="16" x2="22" y2="8"  stroke="#4ade80" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="10" y1="16" x2="22" y2="24" stroke="#4ade80" stroke-width="2.4" stroke-linecap="round"/>
</svg>
